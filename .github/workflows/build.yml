name: Build and Test Gem

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        jruby-version: ["9.3", "9.4"]
        java-version: ["11", "17", "21"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.java-version }}

      - name: Set up JRuby
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1.301.0
        with:
          ruby-version: jruby-${{ matrix.jruby-version }}
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle install
          ./gradlew clean vendor

      - name: Build gem
        run: gem build logstash-integration-aws.gemspec
